paths:
  data_dir: ./local-data
  database_path: ./local-data/agenta.sqlite3
  attachments_dir: ./local-data/attachments
  error_log: ./local-data/logs/error.log

project_context:
  paths:
    - .agenta
    - .dev_doc/.agenta
    - dev_docs/.agenta
  manifest: project.yaml

mcp:
  bind: 127.0.0.1:8787
  path: /mcp
  autostart: false
  log:
    level: info
    # Omit destinations to use host defaults:
    # desktop-managed MCP => [ui, file]
    # standalone agenta-mcp => [stdout]
    file:
      path: ./local-data/logs/mcp.jsonl
    ui:
      buffer_lines: 1000

sync:
  enabled: false
  mode: manual_bidirectional
  auto:
    # Desktop-only automatic sync is opt-in. It does not run from CLI commands.
    enabled: false
    interval: 60s
    batch_limit: 100
    startup_backfill: true
  remote:
    id: primary
    kind: postgres
    postgres:
      dsn: ${POSTGRES_DSN}
      max_conns: 30
      min_conns: 5
      max_conn_lifetime: 1h

search:
  vector:
    enabled: false
    backend: chroma
    endpoint: http://127.0.0.1:8000
    autostart_sidecar: true
    sidecar_data_dir: ./local-data/search/chroma
    collection: agenta_tasks_v1
    top_k: 40
  embedding:
    provider: openai_compatible
    base_url: ${OPENAI_BASE_URL}
    # Prefer api_key_env for secrets. api_key is also supported for local-only configs.
    api_key_env: OPENAI_API_KEY
    # api_key: ${OPENAI_API_KEY}
    model: text-embedding-3-small
    timeout_ms: 10000

policy:
  default: auto
  actions:
    project.create: auto
    project.update: auto
    version.create: auto
    version.update: auto
    task.create: auto
    task.create_child: auto
    task.attach_child: auto
    task.detach_child: auto
    task.add_blocker: auto
    task.resolve_blocker: auto
    task.update: auto
    note.create: auto
    attachment.create: auto
