paths:
  data_dir: ./local-data
  database_path: ./local-data/agenta.sqlite3
  attachments_dir: ./local-data/attachments

mcp:
  bind: 127.0.0.1:8787
  path: /mcp
  autostart: false
  log:
    level: info
    # Omit destinations to use host defaults:
    # desktop-managed MCP => [ui, file]
    # standalone agenta-mcp => [stdout]
    file:
      path: ./local-data/logs/mcp.jsonl
    ui:
      buffer_lines: 1000

sync:
  enabled: false
  mode: manual_bidirectional
  remote:
    id: primary
    kind: postgres
    postgres:
      dsn: ${POSTGRES_DSN}
      max_conns: 30
      min_conns: 5
      max_conn_lifetime: 3600      

policy:
  default: auto
  actions:
    project.create: auto
    project.update: auto
    version.create: auto
    version.update: auto
    task.create: auto
    task.update: auto
    note.create: auto
    attachment.create: auto
